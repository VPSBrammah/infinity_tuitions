<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Tuitions - 10th Full Master Suite</title>
    <style>
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --primary: #1b4f72;
            --primary-light: #e8f0fe;
            --accent: #2e86c1;
            --text: #2c3e50;
            --text-muted: #7f8c8d;
            --success: #27ae60;
            --success-light: #d4edda;
            --success-text: #155724;
            --danger: #e74c3c;
            --danger-light: #f8d7da;
            --danger-text: #721c24;
            --border: #ddd;
        }

        [data-theme="Dark"] {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #0f2d42;
            --primary-light: #1b365d;
            --accent: #3498db;
            --text: #e0e0e0;
            --text-muted: #a0a0a0;
            --success: #2ecc71;
            --success-light: #1b3c26;
            --success-text: #2ecc71;
            --danger: #e74c3c;
            --danger-light: #3d1c1c;
            --danger-text: #e74c3c;
            --border: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.2s, color 0.2s;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 20px 15px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .logo-placeholder {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .theme-toggle-btn {
            position: absolute;
            right: 10px;  /* Changed from left: 20px to right: 20px */
            top: 50%;
            transform: translateY(-50%);
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .container {
            max-width: 980px;
            width: 100%;
            margin: 25px auto;
            padding: 0 20px;
            flex: 1;
        }

        .hidden {
            display: none !important;
        }

        /* Home Dashboard Layout */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 8px;
        }

        .menu-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 6px;
            font-size: 0.95rem;
            color: var(--text);
            cursor: pointer;
        }

        .menu-btn:hover {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        /* Profile Side Panel */
        .profile-title {
            color: var(--accent);
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-item {
            font-size: 0.95rem;
            margin: 10px 0;
        }

        .divider {
            height: 1px;
            background-color: var(--border);
            margin: 15px 0;
        }

        .history-box {
            background-color: var(--bg);
            border-radius: 6px;
            padding: 10px;
            height: 280px;
            overflow-y: auto;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .history-item {
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed var(--border);
        }

        /* Dynamic Buttons */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .btn-danger { background-color: var(--danger); color: white; }
        .btn-accent { background-color: var(--accent); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-block { width: 100%; display: block; margin-top: 10px; }

        /* Quiz Interface */
        .meta-text {
            font-style: italic;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .progress-container {
            width: 100%;
            background-color: var(--border);
            height: 12px;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-inner {
            width: 0%;
            height: 100%;
            background-color: var(--accent);
            transition: width 0.3s;
        }

        .question-box {
            font-size: 1.15rem;
            font-weight: bold;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 6px;
            background-color: var(--surface);
            margin-bottom: 20px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .options-layout {
            margin-bottom: 25px;
        }

        .option-node {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 10px;
            cursor: pointer;
            background-color: var(--surface);
            font-size: 1rem;
        }

        .option-node:hover {
            background-color: var(--primary-light);
        }

        .option-node input {
            margin-right: 15px;
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        /* Verification Glow Rules */
        .option-node.success-glow {
            background-color: var(--success-light) !important;
            border-color: var(--success) !important;
            color: var(--success-text) !important;
            font-weight: bold;
        }

        .option-node.danger-glow {
            background-color: var(--danger-light) !important;
            border-color: var(--danger) !important;
            color: var(--danger-text) !important;
        }

        .option-node.disabled {
            pointer-events: none;
            opacity: 0.8;
        }

        .footer-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            border-top: 1px solid var(--border);
            padding-top: 25px;
        }

        .score-track {
            font-weight: bold;
            color: var(--success);
            font-size: 1.1rem;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        /* Report Log Display */
        .report-textarea {
            width: 100%;
            height: 380px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background-color: var(--surface);
            color: var(--text);
            resize: none;
            white-space: pre;
            overflow-x: auto;
            margin: 15px 0;
        }
    </style>
</head>
