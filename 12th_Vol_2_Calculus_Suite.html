        function filterExercise(scope) {
            currentScope = scope;
            activeIdx = 0;
            
            // Highlight active left button configuration
            document.querySelectorAll(".exercise-selector-btn").forEach(btn => {
                btn.classList.remove("active");
                if (btn.innerText.includes(scope) || (scope === 'ALL' && btn.id === 'btn-all')) {
                    btn.classList.add("active");
                }
            });

            if (scope === "ALL") {
                filteredQuestions = [...ALL_QUESTIONS];
            } else {
                filteredQuestions = ALL_QUESTIONS.filter(q => q.exercise === scope);
            }
            
            refreshQuestionView();
        }

        function refreshQuestionView() {
            if (filteredQuestions.length === 0) {
                document.getElementById("question-board").innerHTML = `<h3>No questions available in this category blueprint.</h3>`;
                return;
            }
            
            if (activeIdx >= filteredQuestions.length) {
                document.getElementById("question-board").innerHTML = `<h3 style='color: var(--success);'>🎉 Section Evaluation Sequence Complete! Click 'Compile Performance Report' to review.</h3>`;
                return;
            }
            
            const dataObj = filteredQuestions[activeIdx];
            document.getElementById("ex-tag").innerText = `${dataObj.exercise} — Question ${activeIdx + 1} of ${filteredQuestions.length}`;
            document.getElementById("q-text").innerHTML = dataObj.question;
            
            const optWrapper = document.getElementById("options-block");
            optWrapper.innerHTML = "";
            
            dataObj.options.forEach((optText) => {
                const element = document.createElement("button");
                element.className = "quiz-option";
                element.innerHTML = optText;
                element.onclick = () => verifyUserSubmission(optText);
                optWrapper.appendChild(element);
            });
            
            if (window.MathJax) { MathJax.typesetPromise(); }
        }

        function verifyUserSubmission(chosenText) {
            answered++;
            const currentQuestion = filteredQuestions[activeIdx];
            let statusText = "WRONG";
            
            if(chosenText === currentQuestion.correct) {
                correctAnswersCount++;
                statusText = "CORRECT";
                alert("Correct Entry Recorded!");
            } else {
                alert(`Incorrect Trace. Correct target option was: ${currentQuestion.correct}`);
            }
            
            reportDataLog += `Question ${activeIdx + 1} [${currentQuestion.exercise}]: ${currentQuestion.question}\nYour Selection: ${chosenText} -> [${statusText}]\n\n`;
            
            document.getElementById("m-total").innerText = answered;
            document.getElementById("m-acc").innerText = `${Math.round((correctAnswersCount / answered) * 100)}%`;
            activeIdx++;
            refreshQuestionView();
        }

        function generateSystemReport() {
            document.getElementById("report-view-panel").style.display = "block";
            const textarea = document.getElementById("ledger-text");
            textarea.value = `==================================================\n` +
                             `INFINITY TUITIONS - MATHEMATICS PERFORMANCE LEDGER\n` +
                             `==================================================\n` +
                             `Timestamp Session: ${new Date().toLocaleString()}\n` +
                             `Evaluated Metrics: ${answered} Problems Addressed\n` +
                             `Precision Metric Accuracy: ${document.getElementById("m-acc").innerText}\n` +
                             `Scope Block Focus: ${currentScope}\n` +
                             `==================================================\n\n` +
                             `${reportDataLog}`;
        }

        function switchTheme() {
            currentTheme = currentTheme === "Light" ? "Dark" : "Light";
            document.documentElement.setAttribute("data-theme", currentTheme);
            document.getElementById("theme-btn").innerText = `🌓 Theme: ${currentTheme}`;
        }

        // Initialize setup with the complete list on boot up sequence operations
        window.onload = () => {
            filterExercise('ALL');
        };
    </script>
